<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Benue Security</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Contact & Report Issues</h1>

    <nav>
        <a href="index.html">Home</a>
        <a href="incidents.html">Incidents</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<section class="form-section">

    <div class="form-container">

        <h2>Report a Security Issue</h2>
        <p>Please provide accurate information to help improve community safety.</p>

        <form>
            <label>Your Name</label>
            <input type="text" placeholder="Enter your full name" required>

            <label>Email Address</label>
            <input type="email" placeholder="Enter your email" required>

            <label>Location of Incident</label>
            <input type="text" placeholder="E.g. Makurdi, Gboko..." required>

            <label>Details</label>
            <textarea rows="6" placeholder="Describe what happened..." required></textarea>

            <button type="submit">Submit Report</button>
        </form>

    </div>

</section>

<footer>
    <p>&copy; 2026 Benue Security Awareness Project</p>
</footer>

</body>
</html>
